<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="theme-color" content="#000000">
  <title>React App</title>
  <style>
    /* These styles make the body full-height */

    body {
      height: 100%;

      height: 100%;
    }

    }
  </style>
</head>

  </noscript>
  <div id="root"></div>
